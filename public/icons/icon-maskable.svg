<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="LEAP-FITNESS maskable">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D88A"/>
      <stop offset="50%" stop-color="#CFB325"/>
      <stop offset="100%" stop-color="#8E7610"/>
    </linearGradient>
  </defs>
  <!-- full bleed background for maskable -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- mark sized into safe area (centred ~60% of canvas) -->
  <g transform="translate(160,170)">
    <path d="M 0 0 L 0 200 L 144 200 L 144 152 L 56 152 L 56 0 Z"
          fill="url(#gold)"/>
    <circle cx="182" cy="34" r="16" fill="#CFB325"/>
  </g>
</svg>
