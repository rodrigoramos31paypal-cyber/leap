<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="LEAP-FITNESS">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8D88A"/>
      <stop offset="50%" stop-color="#CFB325"/>
      <stop offset="100%" stop-color="#8E7610"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- inner safe area: 96px padding from edges for maskable -->
  <g transform="translate(112,118)">
    <!-- L mark -->
    <path d="M 0 0 L 0 276 L 198 276 L 198 208 L 76 208 L 76 0 Z"
          fill="url(#gold)"/>
    <!-- accent dot (forward motion / momentum) -->
    <circle cx="252" cy="48" r="22" fill="#CFB325"/>
    <!-- subtle stroke under L -->
    <rect x="0" y="280" width="288" height="6" rx="3" fill="#CFB325" opacity="0.35"/>
  </g>
</svg>
